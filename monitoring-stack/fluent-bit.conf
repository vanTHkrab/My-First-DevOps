[SERVICE]
    Flush        1
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name         systemd
    Tag          server.system
    Read_From_Tail On

[INPUT]
    Name         tail
    Path         /root/web-application/logs/access.log
    Tag          web.nginx.access
    Read_from_Head False

[FILTER]
    Name         parser
    Match        web.nginx.access
    Key_Name     log
    Parser       nginx
    Preserve_Key On
    Reserve_Data On

[INPUT]
    Name         tail
    Path         /root/web-application/logs/error.log
    Tag          web.nginx.error
    Read_from_Head False

[OUTPUT]
    Name            opensearch
    Match           *
    Host            opensearch
    Port            9200
    Index           server-logs
    Type            _doc
    Suppress_Type_Name On
    tls             Off
    Include_Tag_Key On
    Tag_Key         tag


