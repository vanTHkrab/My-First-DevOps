services:
  # 🌐 Nginx Reverse Proxy (ด่านหน้า)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - frontend_net
      - shared_net
      - local_net
    depends_on:
      client:
        condition: service_started
      server:
        condition: service_started
    restart: unless-stopped

  client:
    build:
      context: ./clients
      dockerfile: Dockerfile
    volumes:
      - ./clients:/root/app
      - /root/app/node_modules
      - /root/app/.next
      - client_pnpm_store:/root/.local/share/pnpm/store
      - ./logs/client:/root/app/logs
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_API_URL=http://server:3000
    networks:
      - frontend_net
      - shared_net
      - local_net
    depends_on:
      server:
        condition: service_started
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    volumes:
      - ./server:/root/app
      - /root/app/node_modules
      - server_pnpm_store:/root/.local/share/pnpm/store
      - ./logs/server:/root/app/logs
    environment:
      - NODE_ENV=development
      - HOME=/root
      - PNPM_HOME=/root/.local/share/pnpm
      - DATABASE_URL=postgresql://postgres:password@db:5432/nestdb
      - REDIS_URL=redis://redis:6379
    networks:
      - local_net
      - backend_net
      - shared_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=nestdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net
    restart: unless-stopped

networks:
  frontend_net:
    driver: bridge
    name: project_frontend_net
  backend_net:
    driver: bridge
    name: project_backend_net
  local_net:
    driver: bridge
    name: project_local_net
  shared_net:
    external: true
    name: shared_network

volumes:
  postgres_data:
  redis_data:
  client_pnpm_store:
  server_pnpm_store:
